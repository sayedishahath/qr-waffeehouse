<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Waffle Icon -->
  <g transform="translate(10, 10)">
    <!-- Waffle base -->
    <circle cx="30" cy="30" r="25" fill="none" stroke="#F5F5DC" stroke-width="3"/>
    <!-- Waffle grid pattern -->
    <g stroke="#F5F5DC" stroke-width="2" fill="none">
      <!-- Horizontal lines -->
      <line x1="15" y1="20" x2="45" y2="20"/>
      <line x1="15" y1="25" x2="45" y2="25"/>
      <line x1="15" y1="30" x2="45" y2="30"/>
      <line x1="15" y1="35" x2="45" y2="35"/>
      <line x1="15" y1="40" x2="45" y2="40"/>
      <!-- Vertical lines -->
      <line x1="20" y1="15" x2="20" y2="45"/>
      <line x1="25" y1="15" x2="25" y2="45"/>
      <line x1="30" y1="15" x2="30" y2="45"/>
      <line x1="35" y1="15" x2="35" y2="45"/>
      <line x1="40" y1="15" x2="40" y2="45"/>
    </g>
  </g>
  
  <!-- Text -->
  <g transform="translate(70, 20)">
    <!-- Waffee -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F5F5DC">Waffee</text>
    <!-- House -->
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F5F5DC">House</text>
    <!-- Tagline -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="12" fill="#F5F5DC" font-style="italic">Finest Waffles &amp; Coffee</text>
  </g>
</svg>
